<div class="service-area">
    <div class="container">
        <div class="row">
            <div class="section-header">
                <h2>Our Services For Humanity</h2>
            </div>

            <div class="col-lg-4" *ngFor="let item of services">
                <div class="service-area_single">
                    <div class="icon">
                        <img src={{item.icon}} alt="">
                    </div>

                    <h2>{{item.service}}</h2>
                    <p>
                        {{item.desc}}
                    </p>
                </div>
            </div>

        </div>
    </div>
</div>
